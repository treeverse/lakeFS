name: Publish Python CLI (lakefs-cli)

on:
  release:
    types: [released]
  workflow_dispatch:
    inputs:
      tag:
        description: Tag/version to publish
        required: true

jobs:
  deploy:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Extract version
      shell: bash
      run: |
        if [ "${{ github.event.inputs.tag }}" != "" ]; then
          echo "tag=$(echo ${{ github.event.inputs.tag }} | sed s/^v//)" >> $GITHUB_OUTPUT
        else
          echo "tag=$(echo ${GITHUB_REF##*/} | sed s/^v//)" >> $GITHUB_OUTPUT
        fi
      id: version

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: Build platform wheels
      working-directory: clients/python-cli
      run: python build_wheels.py ${{ steps.version.outputs.tag }} --pkg-version ${{ steps.version.outputs.tag }}

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        user: __token__
        password: ${{ secrets.PYPI_API_TOKEN }}
        packages-dir: clients/python-cli/dist/
        verbose: true
